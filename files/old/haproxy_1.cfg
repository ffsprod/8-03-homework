global
    log /dev/log local0
    log /dev/log local1 notice
    daemon
    maxconn 2048

defaults
    log global
    timeout connect 5s
    timeout client 50s
    timeout server 50s

frontend task1_front
    bind *:8080
    mode tcp
    default_backend task1_back

backend task1_back
    mode tcp
    balance roundrobin
    server srv1 127.0.0.1:8001 check
    server srv2 127.0.0.1:8002 check