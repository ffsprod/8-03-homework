global
    log /dev/log local0
    log /dev/log local1 notice
    daemon
    maxconn 2048

defaults
    log global
    mode http
    option httplog
    timeout connect 5s
    timeout client 50s
    timeout server 50s

frontend task2_front
    bind *:8080
    mode http

    acl is_example hdr(host) -i example.local
    use_backend task2_back if is_example

    default_backend task2_deny

backend task2_back
    mode http
    balance roundrobin
    server srv1 127.0.0.1:8011 weight 2 check
    server srv2 127.0.0.1:8012 weight 3 check
    server srv3 127.0.0.1:8013 weight 4 check

backend task2_deny
    mode http
    http-request deny deny_status 403